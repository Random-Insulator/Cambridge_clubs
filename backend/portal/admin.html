<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — CambridgeClubs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b10;
      --surface: #13151f;
      --surface2: #1c1f30;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6ef7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --error: #f87171;
      --success: #4ade80;
      --warning: #fbbf24;
      --radius: 14px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%, rgba(124,110,247,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 80%, rgba(251,191,36,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Login Screen ─────────────────── */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
    .logo span { color: var(--accent2); }
    .admin-badge {
      display: inline-block; background: rgba(251,191,36,0.15);
      color: var(--warning); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 20px; padding: 3px 10px; font-size: 0.72rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      margin-left: 8px; vertical-align: middle;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 16px;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,110,247,0.2); }
    .submit-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      border: none; border-radius: var(--radius);
      color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { display: none; color: var(--error); font-size: 0.84rem; margin-top: 12px;
      padding: 10px 14px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); border-radius: 10px; }
    .error-msg.show { display: block; }

    /* ── Dashboard ────────────────────── */
    #dashboard { display: none; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,11,16,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      padding: 6px 14px; color: var(--muted); font-family: inherit; font-size: 0.82rem;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: var(--error); border-color: var(--error); }

    main { max-width: 900px; margin: 0 auto; padding: 36px 24px; }

    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--muted); font-size: 0.88rem; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px; margin-bottom: 24px; width: fit-content; }
    .tab-btn {
      padding: 8px 18px; border: none; border-radius: 9px; cursor: pointer;
      font-family: inherit; font-size: 0.85rem; font-weight: 500; color: var(--muted);
      background: none; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--surface2); color: var(--text); }

    /* Cards */
    .pending-card {
      display: flex; gap: 16px; align-items: flex-start;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px; margin-bottom: 14px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pending-card.approved { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.04); }
    .pending-card.rejected { opacity: 0.5; }

    .card-thumb {
      width: 90px; height: 90px; border-radius: 12px; object-fit: cover;
      background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0;
    }
    .card-thumb-ph {
      width: 90px; height: 90px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--muted);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .card-title { font-size: 0.95rem; font-weight: 600; }
    .card-club {
      background: rgba(124,110,247,0.15); color: var(--accent2);
      border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase;
    }
    .card-tag {
      background: var(--surface2); color: var(--muted);
      border-radius: 6px; padding: 2px 8px; font-size: 0.72rem;
    }
    .card-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .card-desc { font-size: 0.83rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }

    .card-actions { display: flex; gap: 8px; }
    .approve-btn, .reject-btn {
      padding: 7px 16px; border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    }
    .approve-btn { background: rgba(74,222,128,0.15); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
    .approve-btn:hover { background: rgba(74,222,128,0.25); }
    .reject-btn  { background: rgba(248,113,113,0.12); color: var(--error); border: 1px solid rgba(248,113,113,0.25); }
    .reject-btn:hover { background: rgba(248,113,113,0.22); }
    .approve-btn:disabled, .reject-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
    }
    .status-pill.approved { background: rgba(74,222,128,0.15); color: var(--success); }
    .status-pill.rejected { background: rgba(248,113,113,0.12); color: var(--error); }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: 0.3; }
    .empty-state p  { font-size: 0.9rem; }

    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 0.85rem; }

    .count-badge {
      background: var(--warning); color: #000;
      border-radius: 20px; padding: 2px 8px; font-size: 0.72rem; font-weight: 700;
      margin-left: 6px;
    }
  </style>

  <link rel="icon" href="../../images/favicon.jpg" type="image/jpeg">
</head>
<body>

  <!-- ── Login Screen ─────────────────────────────────── -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="logo">Cambridge<span>Clubs</span> <span class="admin-badge">Admin</span></div>
      <h1>Admin Login</h1>
      <p class="subtitle">Review and approve mentor photo uploads.</p>
      <form id="loginForm">
        <label for="adminPassword">Admin Password</label>
        <input type="password" id="adminPassword" placeholder="Enter admin password" required autocomplete="current-password" />
        <button type="submit" class="submit-btn" id="loginBtn">Sign in →</button>
        <div class="error-msg" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- ── Dashboard ──────────────────────────────────────── -->
  <div id="dashboard">
    <header>
      <div class="header-left">
        <div class="logo" style="margin:0">Cambridge<span>Clubs</span> <span class="admin-badge">Admin</span></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </header>

    <main>
      <div class="page-header">
        <h2>Approval Queue</h2>
        <p>Review uploads submitted by club mentors before they appear publicly.</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabPending" onclick="switchTab('pending')">
          Pending <span class="count-badge" id="pendingCount" style="display:none">0</span>
        </button>
        <button class="tab-btn" id="tabAll" onclick="switchTab('all')">All Uploads</button>
      </div>

      <div id="pendingList"><div class="loading">Loading…</div></div>
    </main>
  </div>

  <script>
    const API   = '';
    let token   = localStorage.getItem('cc_admin_token');
    let allActivities = [];
    let currentTab = 'pending';

    function init() {
      if (token) {
        showDashboard();
      }
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadAll();
    }

    // ── Login ─────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true; btn.textContent = 'Signing in…';
      err.classList.remove('show');

      try {
        const res  = await fetch(`${API}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('adminPassword').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        token = data.token;
        localStorage.setItem('cc_admin_token', token);
        showDashboard();
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign in →';
      }
    });

    // ── Logout ────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('cc_admin_token');
      token = null;
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    });

    // ── Tabs ──────────────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabPending').classList.toggle('active', tab === 'pending');
      document.getElementById('tabAll').classList.toggle('active', tab === 'all');
      renderList();
    }

    // ── Load all activities (admin sees all) ──────────────
    async function loadAll() {
      const list = document.getElementById('pendingList');
      try {
        // Load pending and build a full picture
        const [pendingRes] = await Promise.all([
          fetch(`${API}/api/admin/pending`, { headers: { 'Authorization': `Bearer ${token}` } })
        ]);

        if (pendingRes.status === 401 || pendingRes.status === 403) {
          localStorage.removeItem('cc_admin_token'); token = null;
          location.reload(); return;
        }

        const pending = await pendingRes.json();

        // Also fetch approved for each club to build full list
        const clubs = ['teded','cybersonic','robotics','cookery','quizzaders','finance','Theatre','eco','Technocrates'];
        const approvedAll = (await Promise.all(
          clubs.map(c => fetch(`${API}/api/activities/${c}`).then(r => r.json()))
        )).flat();

        allActivities = [
          ...pending.map(a => ({ ...a, _status: 'pending' })),
          ...approvedAll.map(a => ({ ...a, _status: 'approved' }))
        ].sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

        const pendingCount = pending.length;
        const badge = document.getElementById('pendingCount');
        if (pendingCount > 0) { badge.textContent = pendingCount; badge.style.display = 'inline'; }
        else                    { badge.style.display = 'none'; }

        renderList();
      } catch {
        list.innerHTML = '<div class="loading">Could not load data. Is the server running?</div>';
      }
    }

    function renderList() {
      const list = document.getElementById('pendingList');
      const items = currentTab === 'pending'
        ? allActivities.filter(a => a._status === 'pending')
        : allActivities;

      if (!items.length) {
        list.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <p>${currentTab === 'pending' ? 'No pending uploads — you\'re all caught up! ✓' : 'No uploads yet.'}</p>
          </div>`;
        return;
      }

      list.innerHTML = items.map(a => `
        <div class="pending-card ${a._status}" id="card-${a.id}">
          <img class="card-thumb" src="${API}${a.img}" alt="${a.title}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-thumb-ph" style="display:none">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <div class="card-body">
            <div class="card-top">
              <div class="card-title">${a.title}</div>
              <span class="card-club">${a.clubId}</span>
              <span class="card-tag">${a.tag}</span>
            </div>
            <div class="card-meta">${a.date}  ·  Uploaded ${new Date(a.uploadedAt).toLocaleString()}</div>
            <div class="card-desc">${a.desc || '<em style="opacity:.5">No description</em>'}</div>
            ${a._status === 'pending' ? `
              <div class="card-actions">
                <button class="approve-btn" id="approve-${a.id}" onclick="doApprove('${a.id}')">✓ Approve</button>
                <button class="reject-btn"  id="reject-${a.id}"  onclick="doReject('${a.id}')">✕ Reject</button>
              </div>` : `
              <div><span class="status-pill approved">✓ Approved${a.approvedAt ? '  ' + new Date(a.approvedAt).toLocaleDateString() : ''}</span></div>`
            }
          </div>
        </div>`).join('');
    }

    // ── Approve ───────────────────────────────────────────
    async function doApprove(id) {
      const appBtn = document.getElementById(`approve-${id}`);
      const rejBtn = document.getElementById(`reject-${id}`);
      appBtn.disabled = rejBtn.disabled = true;
      appBtn.textContent = 'Approving…';
      try {
        const res = await fetch(`${API}/api/admin/approve/${id}`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error((await res.json()).error);
        // Update local state
        const act = allActivities.find(a => a.id === id);
        if (act) { act._status = 'approved'; act.approvedAt = new Date().toISOString(); act.approved = true; }
        // Update badge
        const pending = allActivities.filter(a => a._status === 'pending').length;
        const badge = document.getElementById('pendingCount');
        if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline'; }
        else               { badge.style.display = 'none'; }
        renderList();
      } catch (ex) {
        alert('Approve failed: ' + ex.message);
        appBtn.disabled = rejBtn.disabled = false;
        appBtn.textContent = '✓ Approve';
      }
    }

    // ── Reject ────────────────────────────────────────────
    async function doReject(id) {
      if (!confirm('Reject and permanently delete this upload?')) return;
      const appBtn = document.getElementById(`approve-${id}`);
      const rejBtn = document.getElementById(`reject-${id}`);
      appBtn.disabled = rejBtn.disabled = true;
      rejBtn.textContent = 'Rejecting…';
      try {
        const res = await fetch(`${API}/api/admin/reject/${id}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error((await res.json()).error);
        allActivities = allActivities.filter(a => a.id !== id);
        const pending = allActivities.filter(a => a._status === 'pending').length;
        const badge = document.getElementById('pendingCount');
        if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline'; }
        else               { badge.style.display = 'none'; }
        renderList();
      } catch (ex) {
        alert('Reject failed: ' + ex.message);
        appBtn.disabled = rejBtn.disabled = false;
        rejBtn.textContent = '✕ Reject';
      }
    }

    init();
  </script>
  <script src="../nav-previews.js"></script>
</body>
</html>
