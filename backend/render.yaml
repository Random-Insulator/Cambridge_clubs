services:
  - type: web
    name: cambridge-clubs-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
