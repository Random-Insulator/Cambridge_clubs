<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — CCWS Clubs</title>
  <link rel="icon" href="images/favicon.jpg" type="image/jpeg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 800;
      background: linear-gradient(135deg, #e02020, #9333ea, #3b9cf5);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      animation: glitch 3s infinite;
    }
    .sub { font-size: 1.4rem; color: #888; margin: 1rem 0 0.5rem; }
    .msg { font-size: 1rem; color: #555; max-width: 400px; margin-bottom: 2rem; }
    /* DROP YOUR MEME IMAGE HERE ↓↓↓ */
    .meme-img {
      max-width: min(400px, 85vw);
      border-radius: 16px;
      margin: 1.5rem 0;
      box-shadow: 0 0 40px rgba(224,32,32,0.15);
    }
    .back-btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #e02020, #9333ea);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(147,51,234,0.4); }
    @keyframes glitch {
      0%, 100% { filter: none; }
      92% { filter: none; }
      93% { transform: translateX(-3px); filter: hue-rotate(90deg); }
      94% { transform: translateX(3px); filter: hue-rotate(-90deg); }
      95% { transform: translateX(0); filter: none; }
    }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
    .particles span {
      position: absolute;
      width: 3px; height: 3px;
      background: rgba(147,51,234,0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="code">404</div>
  <div class="sub">This page went to join a club</div>
  <div class="msg">...and never came back. Maybe it found its people. You should too.</div>
  <!-- REPLACE src BELOW WITH YOUR MEME IMAGE PATH -->
  <img class="meme-img" src="images/util_cache_03.jpg" alt="oops" onerror="this.style.display='none'">
  <a href="index.html" class="back-btn">← Take me home</a>

  <script>
    const p = document.getElementById("particles");
    for (let i = 0; i < 30; i++) {
      const s = document.createElement("span");
      s.style.left = Math.random() * 100 + "%";
      s.style.animationDuration = (3 + Math.random() * 6) + "s";
      s.style.animationDelay = Math.random() * 5 + "s";
      p.appendChild(s);
    }
  </script>
</body>
</html>
